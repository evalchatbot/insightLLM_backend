version: '3.8'

services:
  app:
    build: .
    container_name: insightllm-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Database Configuration
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_KEY: ${SUPABASE_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      
      # Authentication
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      
      # LLM Configuration
      GROQ_API_KEY: ${GROQ_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CHATBOT_LLM_MODEL: ${CHATBOT_LLM_MODEL:-llama-3.3-70b-versatile}
      LLM_PROVIDER: ${LLM_PROVIDER:-groq}
      
      # RAG Configuration
      USE_ADAPTIVE_RAG: ${USE_ADAPTIVE_RAG:-true}
      USE_MULTI_STEP_RAG: ${USE_MULTI_STEP_RAG:-true}
      
      # Streaming Configuration
      ENABLE_STREAMING: ${ENABLE_STREAMING:-true}
      STREAMING_TIMEOUT: ${STREAMING_TIMEOUT:-60}
      MAX_TOKENS: ${MAX_TOKENS:-2048}
      
      # Performance Settings
      WORKERS: ${WORKERS:-2}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ENABLE_LOGGING: ${ENABLE_LOGGING:-true}
      
      # Telemetry (Optional)
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-insightLLM_production}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      
    volumes:
      # Mount logs directory for persistent logging
      - ./logs:/app/logs
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Resource limits for production
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'
    
    # Network configuration
    networks:
      - insightllm-network

networks:
  insightllm-network:
    driver: bridge

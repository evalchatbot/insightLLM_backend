version: '3.8'

services:
  # Nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: insightllm-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro  # Mount SSL certificates if using HTTPS
    depends_on:
      - app
    networks:
      - insightllm-network

  # Main application
  app:
    build: .
    container_name: insightllm-backend
    restart: unless-stopped
    expose:
      - "8000"  # Only expose to nginx, not to host
    environment:
      # Database Configuration
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_KEY: ${SUPABASE_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      
      # Authentication
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      
      # LLM Configuration
      GROQ_API_KEY: ${GROQ_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CHATBOT_LLM_MODEL: ${CHATBOT_LLM_MODEL:-llama-3.3-70b-versatile}
      LLM_PROVIDER: ${LLM_PROVIDER:-groq}
      
      # RAG Configuration
      USE_ADAPTIVE_RAG: ${USE_ADAPTIVE_RAG:-true}
      USE_MULTI_STEP_RAG: ${USE_MULTI_STEP_RAG:-true}
      
      # Streaming Configuration
      ENABLE_STREAMING: ${ENABLE_STREAMING:-true}
      STREAMING_TIMEOUT: ${STREAMING_TIMEOUT:-60}
      MAX_TOKENS: ${MAX_TOKENS:-2048}
      
      # Performance Settings - Increased for production
      WORKERS: ${WORKERS:-4}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      
      # Production optimizations
      UVICORN_LIMIT_CONCURRENCY: 2000
      UVICORN_LIMIT_MAX_REQUESTS: 50000
      
      # Telemetry
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-insightLLM_production}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-true}
      
    volumes:
      - ./logs:/app/logs
      - /tmp:/tmp  # For temporary file processing
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    
    # Production resource limits
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 2G
          cpus: '1.0'
      replicas: 1
    
    networks:
      - insightllm-network

  # Redis for caching (optional but recommended for production)
  redis:
    image: redis:7-alpine
    container_name: insightllm-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - insightllm-network

networks:
  insightllm-network:
    driver: bridge

volumes:
  redis_data:
